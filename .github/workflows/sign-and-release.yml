# sign-and-release.yml
#
# CI/CD pipeline for the Secure OTA Firmware Update project.
#
# This workflow triggers automatically when a release tag matching
# v*.*.* (e.g. v1.0.0, v1.2.3) is pushed to the repository.
#
# Pipeline steps (to be completed across Week 2):
# Day 1 — Skeleton: trigger, checkout, Python setup    <- TODAY
# Day 2 — Inject private key from GitHub Secrets, run sign_firmware.py
# Day 3 — Run generate_manifest.py and upload_to_s3.py, cleanup private key
#
# SECURITY NOTE:
# The private key is NEVER hardcoded in this file. It is injected
# at runtime from GitHub Secrets (FIRMWARE_PRIVATE_KEY) and written
# to a temporary file that is deleted after the signing step.

name: Sign and Release Firmware

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  sign-firmware:
    name: Sign Firmware and Upload to S3
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ─────────────────────────────────────────────
      # Day 2 steps will be added here:
      #   - Write private key from GitHub Secret to /tmp
      #   - Run sign_firmware.py
      # ─────────────────────────────────────────────

      # ─────────────────────────────────────────────
      # Day 3 steps will be added here:
      #   - Run generate_manifest.py
      #   - Run upload_to_s3.py
      #   - Clean up /tmp private key (if: always())
      # ─────────────────────────────────────────────

      - name: Pipeline skeleton check
        run: |
          echo "Workflow triggered successfully on tag: ${{ github.ref_name }}"
          echo "Checkout and Python setup complete"
          echo "Signing and upload steps coming in Day 2 and Day 3"